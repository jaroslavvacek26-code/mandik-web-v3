steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mandik-web'
      - '.'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mandik-web']

  # 3. Deploy to Cloud Run (token injected as runtime env var from Secret Manager)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mandik-web'
      - '--image=gcr.io/$PROJECT_ID/mandik-web'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--update-secrets=PORTFOLIO_TOKEN=VITE_PORTFOLIO_API_TOKEN:latest'

options:
  logging: CLOUD_LOGGING_ONLY
