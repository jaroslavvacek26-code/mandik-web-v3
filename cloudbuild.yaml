steps:
  # 1. Build Docker image (with API token injected at build time)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mandik-web'
      - '--build-arg'
      - 'VITE_PORTFOLIO_API_TOKEN=$$VITE_PORTFOLIO_API_TOKEN'
      - '.'
    secretEnv: ['VITE_PORTFOLIO_API_TOKEN']

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mandik-web']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'run'
      - 'deploy'
      - 'mandik-web'
      - '--image=gcr.io/$PROJECT_ID/mandik-web'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
    entrypoint: gcloud

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_PORTFOLIO_API_TOKEN/versions/latest
      env: VITE_PORTFOLIO_API_TOKEN
